secrets:
  cloudflare-token:
    file: "secrets/cloudflare-token.secret"
  cloudflare-email:
    file: "secrets/cloudflare-email.secret"

networks:
  production:
    external: true
    name: production

services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      #Ativar providers e painel
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Configurar Let's Encrypt via DNS-01 challenge
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.cloudflare.resolvers=1.1.1.1:53,1.0.0.1:53"
      - "--certificatesresolvers.letsencrypt.acme.dnschallenge.delayBeforeCheck=20s"
      - "--certificatesresolvers.letsencrypt.acme.email=dev.celao@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"

      # Redirecionamento de HTTP para HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.redirect.entryPoint.to=websecure"
      - "--entrypoints.websecure.http.redirect.entryPoint.scheme=https"

      # Configurar TLS para o domnínio e wildcard
      - "--entrypoint.websecure.http.tls=true"
      - "--entrypoint.websecure.http.tls.certResolver=letsencrypt"
      - "--entrypoint.websecure.http.tls.domains=[0].main=facihub.com.br"
      - "--entrypoint.websecure.http.tls.domains=[0].sans=[*.facihub.com.br]"

      # Habilitar logs detalhados
      - "--log.level=DEBUG"

      # Habilitando Metricas Prometheus
      - "--metrics.prometheus=true"
  labels:
    # Acesso ao painel do Traefik
    - "traefik.enable=true"
    - "traefik.http.routers.traefik.rule=Host(`traefik.facihub.com.br`)"
    - "traefik.http.routers.traefik.entrypoints=websecure"
    - "traefik.http.routers.traefik.service=api@internal"
    - "traefik.http.middlewares.traefik-auth.basicauth.users=admin:$$2a$$10$$hu2CMcBV8XJx6KxyLr9jeuQMvfuANgpjCnZfOfI8mz0tJDg87cR4G"
    - "traefik.http.routers.traefik.middlewares=traefik-auth"

  secrets:
    - cloudflare-token
    - cloudflare-email
  environment:
    - CF_DNS_API_TOKEN_FILE=/run/secrets/cloudflare-token
    - CF_DNS_API_EMAIL_FILE=/run/secrets/cloudflare-email
  ports:
    - "80:80"
    - "443:443"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - ./certs:/letsencrypt
  networks:
    - production