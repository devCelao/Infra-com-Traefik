name: "Deploy Infra"
on:
  push:
    branches:
      - main
jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "Copy Files"
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "/root/Infra-com-Traefik"
          debug: true

      - name: Set permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /root/Infra-com-Traefik/Infrastructure/traefik

            mkdir -p certs
            touch certs/acme.json
            chmod 700 certs
            chmod 600 certs/acme.json

            echo "== Permissões no host =="
            ls -ld certs
            ls -l certs/acme.json
